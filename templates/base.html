<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ seo.title }}</title>
  <meta name="description" content="{{ seo.description }}">
  <meta name="keywords" content="{{ seo.keywords }}">
  <meta name="author" content="{{ portfolio.profile.name }}">
  <meta property="og:title" content="{{ seo.title }}">
  <meta property="og:description" content="{{ seo.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ seo.url }}">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='images/favicon.svg') }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui"],
            mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular"]
          },
          colors: {
            zinc: tailwind.colors.zinc
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
</head>
<body class="bg-[#f8fafc] text-slate-900 antialiased">
  <div class="page-grid"></div>
  {% include "components/navbar.html" %}
  <main>
    {% block content %}{% endblock %}
  </main>
  {% include "components/footer.html" %}
  <script src="{{ url_for('static', path='js/main.js') }}" defer></script>
</body>
</html>
